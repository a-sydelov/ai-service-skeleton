worker_processes auto;

pcre_jit on;

error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 8192;
    multi_accept on;
}

http {
    resolver 127.0.0.11 ipv6=off valid=10s;

    upstream inference_v1_upstream {
        zone v1_upstream 64k;
        least_conn;
        server inference-v1:8000 resolve;
        keepalive 64;
    }

    upstream inference_v2_upstream {
        zone v2_upstream 64k;
        least_conn;
        server inference-v2:8000 resolve;
        keepalive 64;
    }

    upstream router_control_plane_upstream {
        zone router_upstream 64k;
        least_conn;
        server router:8080 resolve;
        keepalive 32;
    }

    include /etc/nginx/generated/rollout_http.conf;

    server {
        listen 8080;
        access_log off;

        location = /healthz {
            add_header Content-Type text/plain;
            return 200 "ok";
        }

        location = /info {
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_pass http://router_control_plane_upstream/info;
        }

        location = /variants/info {
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_pass http://router_control_plane_upstream/variants/info;
        }

        location /admin/ {
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_pass http://router_control_plane_upstream;
        }

        location = /v1/predict {
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header X-Request-ID $request_id_for_rollout;
            proxy_pass http://inference_v1_upstream/predict;
        }

        location = /v2/predict {
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header X-Request-ID $request_id_for_rollout;
            proxy_pass http://inference_v2_upstream/predict;
        }

        location = /predict {
            rewrite ^ $predict_internal_uri last;
        }

        location = /__predict_v1 {
            internal;
            include /etc/nginx/generated/rollout_predict_location.conf;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header X-Request-ID $request_id_for_rollout;
            proxy_set_header X-Compare-Role primary;
            proxy_set_header X-Compare-Variant v1;
            proxy_pass http://inference_v1_upstream/predict;
        }

        location = /__predict_v2 {
            internal;
            include /etc/nginx/generated/rollout_predict_location.conf;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header X-Request-ID $request_id_for_rollout;
            proxy_set_header X-Compare-Role primary;
            proxy_set_header X-Compare-Variant v2;
            proxy_pass http://inference_v2_upstream/predict;
        }

        location = /__shadow_dispatch {
            internal;
            rewrite ^ $shadow_internal_uri last;
        }

        location = /__shadow_off {
            internal;
            return 204;
        }

        location = /__shadow_v1 {
            internal;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header X-Request-ID $request_id_for_rollout;
            proxy_set_header X-Compare-Role shadow;
            proxy_set_header X-Compare-Variant v1;
            proxy_pass http://inference_v1_upstream/predict;
        }

        location = /__shadow_v2 {
            internal;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header X-Request-ID $request_id_for_rollout;
            proxy_set_header X-Compare-Role shadow;
            proxy_set_header X-Compare-Variant v2;
            proxy_pass http://inference_v2_upstream/predict;
        }
    }
}
